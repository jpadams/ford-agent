<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>ford-agent chat</title>
  <style>
    :root { --bg: #f6f7f9; --fg: #1c1e21; --muted: #6b7280; --user: #2563eb; --assistant: #111827; --border: #d1d5db; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, system-ui, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--fg); }
    .app { max-width: 960px; margin: 0 auto; padding: 16px; display: flex; flex-direction: column; height: 100vh; gap: 12px; }
    header { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    h1 { font-size: 18px; margin: 0; }
    .cid { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12px; color: var(--muted); word-break: break-all; }
    button { font: inherit; padding: 8px 14px; border: 1px solid var(--border); background: white; border-radius: 6px; cursor: pointer; }
    button:hover:not(:disabled) { background: #f0f0f0; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    #canvas-wrap { position: relative; height: 45vh; border: 1px solid var(--border); border-radius: 8px; background: white; overflow: hidden; }
    #canvas { width: 100%; height: 100%; }
    #canvas-empty { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; color: var(--muted); font-style: italic; pointer-events: none; }
    #canvas-empty.hidden { display: none; }

    .chat-area { flex: 1; display: flex; flex-direction: column; min-height: 0; }
    .messages { flex: 1; overflow-y: auto; padding: 12px; background: white; border: 1px solid var(--border); border-radius: 8px; }
    .msg { margin-bottom: 14px; }
    .msg .role { font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); margin-bottom: 4px; }
    .msg.user .role { color: var(--user); }
    .msg .content { white-space: pre-wrap; line-height: 1.45; }
    .empty { color: var(--muted); font-style: italic; }
    form { display: flex; gap: 8px; margin-top: 12px; }
    textarea { flex: 1; resize: vertical; min-height: 56px; max-height: 200px; padding: 10px; border: 1px solid var(--border); border-radius: 6px; font: inherit; }
    .status { font-size: 12px; color: var(--muted); margin-top: 6px; min-height: 16px; }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div>
        <h1>ford-agent</h1>
        <div class="cid">conversation: <span id="cid">…</span></div>
      </div>
      <button id="new-btn" type="button">New convo</button>
    </header>

    <div id="canvas-wrap">
      <div id="canvas"></div>
      <div id="canvas-empty">no graph to display</div>
    </div>

    <div class="chat-area">
      <div id="messages" class="messages"><div class="empty">No messages yet.</div></div>

      <form id="chat-form">
        <textarea id="input" placeholder="Ask about the graph… (Enter to send, Shift+Enter for newline)" required></textarea>
        <button id="submit-btn" type="submit">Submit</button>
      </form>
      <div id="status" class="status"></div>
    </div>
  </div>

<script type="module">
let NVL = null;
try {
  const mod = await import('https://esm.sh/@neo4j-nvl/base@1.2.0');
  NVL = mod.NVL;
} catch (e) {
  console.error('NVL bundle failed to load — visualization disabled', e);
}

const messagesEl = document.getElementById('messages');
const cidEl = document.getElementById('cid');
const formEl = document.getElementById('chat-form');
const inputEl = document.getElementById('input');
const submitBtn = document.getElementById('submit-btn');
const newBtn = document.getElementById('new-btn');
const statusEl = document.getElementById('status');
const canvasEl = document.getElementById('canvas');
const canvasEmpty = document.getElementById('canvas-empty');

let nvl = null;

function renderMessages(messages) {
  if (!messages.length) {
    messagesEl.innerHTML = '<div class="empty">No messages yet.</div>';
    return;
  }
  messagesEl.innerHTML = messages.map(m => {
    const role = m.role === 'user' ? 'You' : 'Assistant';
    const cls = m.role === 'user' ? 'user' : 'assistant';
    const safe = escapeHtml(m.content);
    return `<div class="msg ${cls}"><div class="role">${role}</div><div class="content">${safe}</div></div>`;
  }).join('');
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function escapeHtml(s) {
  return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function setBusy(busy, msg = '') {
  submitBtn.disabled = busy;
  newBtn.disabled = busy;
  inputEl.disabled = busy;
  statusEl.textContent = msg;
}

function clearViz() {
  if (nvl) {
    try { nvl.destroy(); } catch (e) { /* ignore */ }
    nvl = null;
  }
  canvasEl.innerHTML = '';
  canvasEmpty.classList.remove('hidden');
}

function renderViz(viz) {
  if (!viz || !viz.nodes || viz.nodes.length === 0) {
    clearViz();
    return;
  }
  clearViz();
  if (!NVL) {
    canvasEmpty.textContent = 'Visualization library not loaded — see browser console.';
    return;
  }
  canvasEmpty.classList.add('hidden');
  const nvlNodes = viz.nodes.map(n => ({
    id: n.id,
    captions: n.caption ? [{ value: n.caption, styles: ['bold'] }] : [],
  }));
  const nvlRels = (viz.relationships || []).map(r => ({
    id: r.id,
    from: r.from,
    to: r.to,
    captions: r.type ? [{ value: r.type }] : [],
  }));
  try {
    nvl = new NVL(canvasEl, nvlNodes, nvlRels, { initialZoom: 1 });
  } catch (e) {
    console.error('NVL render failed', e);
    clearViz();
    statusEl.textContent = 'Visualization failed: ' + e.message;
  }
}

async function loadHistory() {
  setBusy(true, 'Loading…');
  try {
    const res = await fetch('/chat', { credentials: 'same-origin' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    cidEl.textContent = data.conversationId;
    renderMessages(data.messages);
    clearViz();
    setBusy(false);
  } catch (e) {
    setBusy(false, 'Failed to load history: ' + e.message);
  }
}

async function sendMessage(text) {
  setBusy(true, 'Thinking…');
  const userMsg = { role: 'user', content: text };
  const currentMessages = Array.from(messagesEl.querySelectorAll('.msg')).map(m => ({
    role: m.classList.contains('user') ? 'user' : 'assistant',
    content: m.querySelector('.content').textContent
  }));
  renderMessages([...currentMessages, userMsg]);
  try {
    const res = await fetch('/chat', {
      method: 'POST',
      credentials: 'same-origin',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({ message: text })
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    cidEl.textContent = data.conversationId;
    renderMessages([...currentMessages, userMsg, { role: 'assistant', content: data.reply }]);
    renderViz(data.viz);
    setBusy(false);
  } catch (e) {
    setBusy(false, 'Request failed: ' + e.message);
  }
}

async function newConversation() {
  setBusy(true, 'Starting new conversation…');
  try {
    const res = await fetch('/chat/new', { method: 'POST', credentials: 'same-origin' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    cidEl.textContent = data.conversationId;
    renderMessages([]);
    clearViz();
    setBusy(false, 'New conversation started.');
  } catch (e) {
    setBusy(false, 'Failed: ' + e.message);
  }
}

formEl.addEventListener('submit', e => {
  e.preventDefault();
  const text = inputEl.value.trim();
  if (!text) return;
  inputEl.value = '';
  sendMessage(text);
});

inputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    formEl.requestSubmit();
  }
});

newBtn.addEventListener('click', newConversation);

loadHistory();
</script>
</body>
</html>
